<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Zoltar - Den Forvitrede Ånd</title>
    <style>
        body { background: #050508; color: #b4884a; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        #eye-container { width: 120px; height: 120px; border-radius: 50%; border: 2px solid #b4884a; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.5s; box-shadow: 0 0 20px rgba(180,136,74,0.2); }
        #eye-pupil { width: 30px; height: 30px; background: #b4884a; border-radius: 50%; }
        .listening #eye-container { border-color: #fff; box-shadow: 0 0 40px #fff; }
        .listening #eye-pupil { background: #fff; transform: scale(1.3); }
        #text-display { margin-top: 30px; font-size: 20px; color: #e8dece; max-width: 80%; min-height: 50px; font-style: italic; line-height: 1.6; }
        #status { margin-top: 15px; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; }
        .key-input { background: #111; border: 1px solid #333; color: #555; padding: 5px; font-size: 10px; margin-bottom: 20px; border-radius: 4px; }
    </style>
</head>
<body>

    <input type="password" id="api-key" class="key-input" placeholder="Indtast API Nøgle her...">

    <div id="eye-container" onclick="toggleMic()">
        <div id="eye-pupil"></div>
    </div>

    <div id="text-display">Zoltar sover... rør ved øjet for at vække ham.</div>
    <div id="status">Klik for at tale</div>

<script>
    let history = [];
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'da-DK';

    function speak(text) {
        window.speechSynthesis.cancel(); // Stop tidligere tale
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'da-DK';
        utterance.pitch = 0.6;
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
        document.getElementById('text-display').textContent = text;
    }

    function toggleMic() {
        const key = document.getElementById('api-key').value;
        if (!key) { alert("Husk at indtaste din Gemini API nøgle øverst!"); return; }
        
        try {
            recognition.start();
            document.body.classList.add('listening');
            document.getElementById('status').textContent = "Zoltar lytter til dig...";
        } catch(e) {}
    }

    recognition.onresult = async (event) => {
        document.body.classList.remove('listening');
        const userSpeech = event.results[0][0].transcript;
        document.getElementById('status').textContent = "Zoltar tænker...";

        const apiKey = document.getElementById('api-key').value;
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [...history, { role: "user", parts: [{ text: userSpeech }] }],
                system_instruction: { parts: [{ text: "Du er ånden Zoltar. Du er venlig og hjælpeløs. Din hukommelse er forvitret. Du ved intet om landbrug, men har brug for elevernes hjælp. Svar kort (max 2 sætninger) på dansk. Vær taknemmelig og stil spørgsmål." }] }
            })
        });

        const data = await response.json();
        const reply = data.candidates[0].content.parts[0].text;
        
        history.push({ role: "user", parts: [{ text: userSpeech }] });
        history.push({ role: "model", parts: [{ text: reply }] });
        
        speak(reply);
        document.getElementById('status').textContent = "Tryk på øjet for at svare";
    };

    recognition.onerror = () => {
        document.body.classList.remove('listening');
        document.getElementById('status').textContent = "Jeg hørte intet... prøv igen.";
    };
</script>
</body>
</html>
